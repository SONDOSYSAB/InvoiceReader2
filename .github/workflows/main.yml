name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev cmake
      - name: Build
        run: |
          pip3 install --upgrade buildozer cython
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          (yes | sdkmanager --licenses) || true
          buildozer android debug
